version: '3.9'

services:
  api:
    build:
      context: .
      target: production
    container_name: fieldeaze_api
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - fieldeaze_net

  postgres:
    image: postgres:16-alpine
    container_name: fieldeaze_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fieldeaze}
      POSTGRES_USER: ${POSTGRES_USER:-fieldeaze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fieldeaze}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fieldeaze_net

  minio:
    image: minio/minio:latest
    container_name: fieldeaze_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - fieldeaze_net

volumes:
  postgres_data:
  minio_data:

networks:
  fieldeaze_net:
    driver: bridge
